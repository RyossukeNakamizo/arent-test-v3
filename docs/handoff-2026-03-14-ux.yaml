  - step: "bugfix-1"
    name: "カメラ遷移の修正（Matrix3エラー解消）"
    details:
      - "問題: 指摘クリック時のカメラオフセット(+10,+10,+10)がRevitモデルスケールに対して小さすぎた"
      - "症状: Console に Matrix3.getInverse(): determinant is 0 が1000回発生"
      - "原因: カメラ位置(eye)と注視点(target)が近すぎてビューマトリクスが縮退"
      - "修正: モデルバウンディングボックスの対角長からオフセット距離を動的計算"
    fix_location: "frontend/src/components/ApsViewer.tsx:175-197"
    fix_details:
      before: |
        const offset = new window.THREE.Vector3(10, 10, 10);
        const eye = target.clone().add(offset);
        viewer.navigation.setView(eye, target);
      after: |
        const modelBounds = viewer.model.getBoundingBox();
        const diagonal = modelBounds.getSize(...).length();
        const offsetDistance = Math.max(50, Math.min(500, diagonal * 0.15));
        const offsetVector = new THREE.Vector3(1,1,1).normalize().multiplyScalar(offsetDistance);
        const eye = target.clone().add(offsetVector);
        viewer.navigation.setTarget(target, true);
        viewer.navigation.setPosition(eye);
    verification: "npm run build 成功、docker compose up -d --build frontend 成功"

