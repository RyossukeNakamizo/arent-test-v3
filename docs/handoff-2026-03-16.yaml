    severity: "low"
    description: |
      MinIO SDKで生成したPresigned URLが403を返す。
      原因未特定（署名計算の不整合の可能性）。
      現在はバケットをpublic downloadに設定して回避中。
    workaround: "バケットをpublic download設定、直接URLを使用"
    future_fix: |
      本番環境ではPresigned URLを正しく動作させる必要あり。
      MINIO_EXTERNAL_ENDPOINT設定とMinIO SDK署名計算を再調査。

  - id: "CONSOLE-ERRORS"
    severity: "low"
    description: |
      DevTools Consoleに22 errorsが表示されている（スクリーンショット参照）。
      主にAPS Viewer SDKからのエラーと思われる。
      機能動作には影響なし。
    workaround: "なし（動作に影響なし）"

architecture_notes:
  state_flow: |
    1. IssueList.onClick → handleSelectIssue(issue)
    2. setSelectedIssue(issue) → focusDbId/focusPosition が変化
    3. ApsViewer useEffect → programmaticSelectRef = true → viewer.select()
    4. SELECTION_CHANGED_EVENT 発火 → programmaticSelectRef チェック → スキップ
    5. 詳細パネルが正常に表示される

  photo_flow: |
    1. IssueDetail マウント → useEffect [issue.id] 発火
    2. getPhotoUrl(issueId, photoId) 呼び出し
    3. PhotosController → 直接URL生成（http://localhost:9000/issue-photos/{key}）
    4. <img src={photoUrl}> で画像表示

