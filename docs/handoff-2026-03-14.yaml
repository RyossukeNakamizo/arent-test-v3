  - id: "R2"
    description: "Presigned URLがコンテナ内ホスト名で生成される"
    solution: "外部アクセス用の別MinIOクライアントを作成し、署名をlocalhost:9000で計算"

  - id: "R3"
    description: ".NET 10 Preview Dockerイメージの可用性リスク"
    solution: "mcr.microsoft.com/dotnet/sdk:10.0-preview 利用可能確認済み"

  - id: "R4"
    description: "backend HEALTHCHECK が curl 依存（aspnetイメージに未搭載）"
    solution: "apt-get install curl を追加し、curl ベースの HEALTHCHECK を実装"

  - id: "R5"
    description: "Tailwind CSS設定ファイル不在"
    solution: "globals.css, postcss.config.mjs 作成、layout.tsx 修正"

  - id: "PHOTO-UPLOAD-CONCURRENCY"
    description: "写真アップロード時に DbUpdateConcurrencyException が発生"
    solution: |
      EF Core Owned Entity の変更追跡問題を回避するため、
      Photo を直接 DbContext.Photos に追加する方式に変更。
      - IIssueRepository に AddPhotoAsync メソッド追加
      - PostgresIssueRepository で ExecuteUpdateAsync 使用
      - IssueCommandHandler で ExistsAsync + AddPhotoAsync 使用

